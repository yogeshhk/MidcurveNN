    - keras==2.13.1
    - huggingface-hub
    - transformers>=4.36.0
    - datasets>=2.14.0
    - drawsvg
    - imageio
    - opencv-python
    - matplotlib
    - seaborn>=0.12.0
    - scipy>=1.11.0
